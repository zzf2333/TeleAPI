services:
    teleapi:
        build: .
        ports:
            - "8080:8080"
        volumes:
            - ./data:/app/data
            - ./config.yaml:/app/config.yaml:ro
        environment:
            - TELEAPI_CONFIG=/app/config.yaml
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
